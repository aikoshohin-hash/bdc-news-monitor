  - pattern: "情報開示"
    polarity: -0.15
    lang: ja
    rationale: "開示不足文脈でネガティブ"
    context_required: ["不十分", "不足", "欠如", "問題", "課題", "懸念", "乏しい"]

  - pattern: "警鐘"
    polarity: -0.30
